<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>‘HVL’ - 360° Album Trailer</title>
</head>
<body>
<script>
(function () {
  var VIDEO_ID = "-cu27141I6I";
  var WEB_URL = "https://youtu.be/" + VIDEO_ID;
  var IOS_APP = "youtube://" + VIDEO_ID;
  var ANDROID_INTENT = "intent://www.youtube.com/watch?v=" + VIDEO_ID +
    "#Intent;scheme=https;package=com.google.android.youtube;" +
    "S.browser_fallback_url=" + encodeURIComponent(WEB_URL) + ";end";
  var ua = navigator.userAgent;
  var start = Date.now();
  function fallback() {
    if (Date.now() - start < 300) {
      window.location.href = WEB_URL;
    }
  }
  if (/Android/i.test(ua)) {
    window.location.href = ANDROID_INTENT;
    setTimeout(fallback, 300);
  } 
  else if (/iPhone|iPad|iPod/i.test(ua)) {
    window.location.href = IOS_APP;
    setTimeout(fallback, 300);
  } 
  else {
    window.location.href = WEB_URL;
  }
})();
</script>

</body>
</html>
